name: Build, Analyze, Scan and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: riley280/tic-tac-toe
  IMAGE_TAG: latest

jobs:
  build-analyze-scan:
    name: Build, Analyze and Scan
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install npm dependencies
        run: npm install

      - name: Build and analyze with SonarQube
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=Tic-game
            -Dsonar.projectName=Tic-game
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,build/**,dist/**,coverage/**

      - name: Trivy file scan
        run: trivy fs . --format table --output trivyfs.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker build
        run: docker build -t ${IMAGE_NAME}:${IMAGE_TAG} .

      - name: Trivy image scan
        run: trivy image ${IMAGE_NAME}:${IMAGE_TAG} --format table --output trivyimage.txt

      - name: Docker push
        run: docker push ${IMAGE_NAME}:${IMAGE_TAG}

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivyfs.txt
            trivyimage.txt

  deploy:
    name: Deploy
    needs: build-analyze-scan
    runs-on: [self-hosted]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker pull image
        run: docker pull ${IMAGE_NAME}:${IMAGE_TAG}

      - name: Trivy image scan before deploy
        run: trivy image ${IMAGE_NAME}:${IMAGE_TAG} --format table --output trivyimagedeploy.txt

      - name: Deploy to Docker container
        run: |
          docker rm -f game || true
          docker run -d --name game -p 3000:3000 ${IMAGE_NAME}:${IMAGE_TAG}

      - name: Update kubeconfig
        run: aws eks --region eu-west-2 update-kubeconfig --name EKS_CLOUD

      - name: Deploy to Kubernetes
        run: kubectl apply -f deployment-service.yml

      - name: Upload deploy Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-deploy-report
          path: trivyimagedeploy.txt

      - name: Send Slack Notification
        if: always()
        uses: act10ns/slack@v1
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
          channel: '#githubaction-eks'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}



        
